<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wezi Zimba: Personal Portfolio</title>
    <style>
     :root{
        --bg:#0e0f11;
        --surface:#16181b;
        --surface-2:#1d2024;
        --border:#2a2d31;
        --text:#e8e9ea;
        --text-dim:#9aa0a6;
        --accent:#446879;
        --radius:10px;
     }
     *{margin:0;padding:0;box-sizing:border-box;}
     body{
        background:var(--bg);
        color:var(--text);
        font-family:-apple-system, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, Helvetica, sans-serif;
        line-height:1.5;
     }
     a{color:inherit;text-decoration:none;}
     .wrap{
        max-width: 760px;
        margin:0 auto;
        padding:0 16px;
     }
      .topnav {
        border-bottom: 1px solid var(--border);
        background: rgba(14,15,17,0.9);
        backdrop-filter: blur(6px);
        position: sticky;
        top: 0;
        z-index: 10;
     }

    .topnav .wrap {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
        flex-wrap: wrap;
    }
    
    </style>
  </head>
