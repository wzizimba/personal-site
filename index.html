<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wezi Zimba: Personal Portfolio</title>
    <style>
     :root{
        --bg:#0e0f11;
        --surface:#16181b;
        --surface-2:#1d2024;
        --border:#2a2d31;
        --text:#e8e9ea;
        --text-dim:#9aa0a6;
        --accent:#446879;
        --radius:10px;
     }
     *{margin:0;padding:0;box-sizing:border-box;}
     body{
        background:var(--bg);
        color:var(--text);
        font-family:-apple-system, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, Helvetica, sans-serif;
        line-height:1.5;
     }
     a{color:inherit;text-decoration:none;}
     .wrap{
        max-width: 760px;
        margin:0 auto;
        padding:0 16px;
     }
      .topnav {
        border-bottom: 1px solid var(--border);
        background: rgba(14,15,17,0.9);
        backdrop-filter: blur(6px);
        position: sticky;
        top: 0;
        z-index: 10;
     }

    .topnav .wrap {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
    }
    .brand {
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
    }
    .nav-links button, .nav-links a {
      background: none;
      border: none;
      font-size: 14px;
      color: var(--text-dim);
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .nav-links button:hover, .nav-links a:hover, .nav-links button.active {
      background: var(--surface-2);
      color: var(--text);
    }
    .profile-card {
      margin-top: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .banner {
      width: 100%;
      aspect-ratio: 1584/396;
    }
    .profile-body {
    padding: 0 24px 24px;
    position: relative;
    }

    .profile-photo {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      border: 4px solid var(--surface);
      background: var(--surface-2) center/cover no-repeat;
      margin-top: -56px;
    }

    .name {
      margin-top: 14px;
      font-size: 22px;
      font-weight: 700;
    }

    .headline, .meta {
      margin-top: 4px;
      font-size: 15px;
      color: var(--text-dim);
    }

    .meta {
      margin-top: 8px;
      font-size: 13px;
    }
    section {
      margin-top: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
    }

    section h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .item {
      display: flex;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .item:last-child { border-bottom: none; }

    .item-icon {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      color: var(--text-dim);
    }

    .item-title { font-size: 14px; font-weight: 600; }
    .item-sub, .item-desc { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .item-date { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .item-desc { margin-top: 6px; }

    .skills { display: flex; flex-wrap: wrap; gap: 8px; }

    .skill-tag {
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }

    .project-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      background: var(--surface-2);
      transition: border-color 0.15s;
    }

    .project-card:hover { border-color: var(--accent); }
    .project-card h3 { font-size: 14px; margin-bottom: 6px; }
    .project-card p { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; }
    .project-link { font-size: 13px; color: var(--accent); font-weight: 600; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .gallery-grid div {
      aspect-ratio: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--text-dim);
    }

    footer {
      text-align: center;
      padding: 32px 16px 48px;
      font-size: 13px;
      color: var(--text-dim);
    }

    [hidden] { display: none !important; }

    @media (max-width: 680px) {
      .topnav .wrap { flex-direction: column; height: auto; padding: 8px 0; gap: 8px; }
      .nav-links button, .nav-links a { padding: 6px 8px; font-size: 12px; }
      .projects-grid, .gallery-grid { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>
  
</body>
